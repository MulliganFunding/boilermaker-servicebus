\* TLC model configuration for AllFailedCallback.tla
\* Model: 2 main tasks, 2 workers, 1 callback task.
\*
\* Run with TLC:
\*   java -jar tla2tools.jar -config AllFailedCallback.cfg AllFailedCallback.tla
\*
\* Expected result: all invariants hold, all liveness properties hold,
\*                  no deadlock.

CONSTANTS
    MainTasks = {"T1", "T2"}
    Workers   = {"W1", "W2"}
    CB        = "CB"

SPECIFICATION Spec
\* Dead-letter exhaustion leaves workers idle with no SB messages and a
\* Scheduled blob. This terminal state is handled by a separate reprocessing
\* process outside this spec's scope. Suppress TLC deadlock detection so
\* the dead-lettered quiescent state is not reported as an error.
CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    AtMostOnceDispatch
    CbPublishedBeforeOrWithScheduled
    CbOnlyDispatchedWhenTerminalFailed
    IsCompleteConsistent

PROPERTIES
    EventuallyCbPublished
    EventuallyCbFinished
    EventuallyComplete
