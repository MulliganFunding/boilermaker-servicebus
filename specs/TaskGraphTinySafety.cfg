\* Safety-only config for TaskGraphTiny (2 workers, 2 tasks, MDC=2).
\*
\* WHY THIS EXISTS: The full configs (with PROPERTY liveness checks) never
\* terminate because TLC's liveness algorithm requires SCC analysis over the
\* entire state graph — orders of magnitude slower than BFS safety checking.
\*
\* This config checks ONLY safety invariants via BFS, which terminates in
\* minutes.  Liveness can be checked separately via simulation mode:
\*
\*   java -jar tla2tools.jar -simulate num=100000 -depth 200 \
\*        -config specs/TaskGraphTiny.cfg specs/TaskGraphTiny.tla
\*
\* To run safety check:
\*   java -jar tla2tools.jar \
\*        -config specs/TaskGraphTinySafety.cfg specs/TaskGraphTiny.tla

CONSTANTS
    Nil = "Nil"
    MaxDeliveryCount = 2
    Workers <- WorkerSet
    Tasks <- TaskSet
    RootTasks <- RootTaskSet
    Edges <- DefaultEdges

SPECIFICATION Spec

\* Suppress deadlock: terminal quiescent states are expected (all tasks
\* finished, all workers idle, no messages).
CHECK_DEADLOCK FALSE

\* Bound etag values to prune the state space.  The protocol naturally
\* bounds etags to ~2*MDC+3 per task; this is a generous upper bound.
CONSTRAINT EtagBound

\* --- Safety Invariants ---
INVARIANT TypeOK
INVARIANT NoSchedulingWithPendingAntecedent
INVARIANT ResultWriteNotBlockedByLease
INVARIANT NoPermStuck
INVARIANT NoOrphanedScheduledFinal
