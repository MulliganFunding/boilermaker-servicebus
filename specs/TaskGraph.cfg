\* TLC configuration for TaskGraphProtocol
\*
\* Small model: 2 workers, 3 tasks in a chain (t1 -> t2 -> t3)
\* t1 is the root task (no antecedents).
\*
\* To run with TLC from the project root:
\*   java -jar /Users/eaker/.vscode/extensions/tlaplus.vscode-ide-2026.4.111628/tools/tla2tools.jar \
\*        -config specs/TaskGraph.cfg specs/TaskGraph.tla

CONSTANTS
    Nil = "Nil"
    MaxDeliveryCount = 3
    Workers <- WorkerSet
    Tasks <- TaskSet
    RootTasks <- RootTaskSet
    Edges <- DefaultEdges

SPECIFICATION Spec

\* Dead-letter exhaustion leaves workers idle with no SB messages and a
\* Scheduled blob. This terminal state is handled by a separate reprocessing
\* process outside this spec's scope. Suppress TLC deadlock detection so
\* the dead-lettered quiescent state is not reported as an error.
CHECK_DEADLOCK FALSE

\* --- Safety Invariants ---
INVARIANT TypeOK
INVARIANT NoSchedulingWithPendingAntecedent
INVARIANT ResultWriteNotBlockedByLease
INVARIANT NoPermStuck
\* CHECK: IF STATE REACHABLE, Code doesn't do what we think or spec models it inaccurately
INVARIANT NoOrphanedScheduledFinal

\* --- Liveness / Temporal Properties ---
PROPERTY EventualCompletion
PROPERTY EventualScheduling
PROPERTY NoOrphanedScheduled
