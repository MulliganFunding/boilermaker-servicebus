\* Tiny model with BuggyRetriesExhaustedOrdering=TRUE.
\*
\* This config exercises the OLD (pre-fix) RetriesExhausted-on-receive
\* ordering: parent message is settled BEFORE continue_graph runs.  TLC
\* must find a reachable counterexample violating
\* NoOrphanedRetriesExhausted — confirming the spec actually exercises
\* the orphaning bug.
\*
\* To run:
\*   java -jar tla2tools.jar \
\*        -config specs/TaskGraphTinyBuggyRetriesExhausted.cfg \
\*        specs/TaskGraphTiny.tla
\*
\* Expected outcome:
\*   - NoOrphanedRetriesExhausted FAILS with a counterexample trace where
\*     a task ends up with blobStatus=RetriesExhausted,
\*     blobDeadLettered=TRUE, retriesExhaustedDispatched=FALSE, and no
\*     worker holds its message.
\*   - RetriesExhaustedCallbacksDispatched (if enabled) would also fail.

CONSTANTS
    Nil = "Nil"
    MaxDeliveryCount = 2
    Workers <- WorkerSet
    Tasks <- TaskSet
    RootTasks <- RootTaskSet
    Edges <- DefaultEdges
    \* OLD (buggy) ordering: settle-before-dispatch.
    BuggyRetriesExhaustedOrdering = TRUE

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTRAINT EtagBound

\* --- Safety Invariants ---
INVARIANT TypeOK
INVARIANT NoSchedulingWithPendingAntecedent
INVARIANT ResultWriteNotBlockedByLease
\* The orphaning invariant — expected to fail on the buggy ordering.
INVARIANT NoOrphanedRetriesExhausted
