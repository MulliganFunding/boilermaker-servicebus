\* Tiny model: 2 workers, 2 tasks, MaxDeliveryCount = 2
CONSTANTS
    Nil = "Nil"
    MaxDeliveryCount = 2
    Workers <- WorkerSet
    Tasks <- TaskSet
    RootTasks <- RootTaskSet
    Edges <- DefaultEdges
    BuggyRetriesExhaustedOrdering = FALSE

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANT TypeOK
INVARIANT NoSchedulingWithPendingAntecedent
INVARIANT ResultWriteNotBlockedByLease
INVARIANT NoPermStuck
INVARIANT NoOrphanedScheduledFinal
INVARIANT NoOrphanedRetriesExhausted

PROPERTY EventualCompletion
PROPERTY EventualScheduling
PROPERTY NoOrphanedScheduled
PROPERTY RetriesExhaustedCallbacksDispatched
