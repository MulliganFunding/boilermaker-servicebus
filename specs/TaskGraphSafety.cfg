\* Safety-only config for TaskGraph (2 workers, 3 tasks, MDC=2).
\*
\* Checks all safety invariants without temporal (liveness) properties.
\* The 3-task model is larger than Tiny but still tractable for BFS.
\*
\* To run:
\*   java -jar tla2tools.jar -workers auto \
\*        -config specs/TaskGraphSafety.cfg specs/TaskGraph.tla

CONSTANTS
    Nil = "Nil"
    MaxDeliveryCount = 2
    Workers <- WorkerSet
    Tasks <- TaskSet
    RootTasks <- RootTaskSet
    Edges <- DefaultEdges

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTRAINT EtagBound

\* --- Safety Invariants ---
INVARIANT TypeOK
INVARIANT NoSchedulingWithPendingAntecedent
INVARIANT ResultWriteNotBlockedByLease
INVARIANT NoPermStuck
INVARIANT NoOrphanedScheduledFinal
